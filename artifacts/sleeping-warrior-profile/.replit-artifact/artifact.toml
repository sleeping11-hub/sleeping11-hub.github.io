kind = "web"
previewPath = "/"
title = "SleepingWarrior — Fiverr Profile"
version = "1.0.0"
id = "artifacts/sleeping-warrior-profile"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 23929
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/sleeping-warrior-profile run dev"

[services.env]
PORT = "23929"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/sleeping-warrior-profile", "run", "build"]
publicDir = "artifacts/sleeping-warrior-profile/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
